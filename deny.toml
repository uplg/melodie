# cargo-deny config. Run with `just deny` or `cargo deny check`.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    # `paste` (deep transitive dep of the candle/tokenizers ML stack) was
    # archived by its maintainer. No CVE, no unsafe-upgrade needed — it's a
    # small, stable proc-macro crate that's simply done, not broken.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained, not vulnerable; transitive dep of candle/tokenizers" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "CC0-1.0",
    "MIT-0",
    # Data license on the bundled webpki/Mozilla root CA list (rustls), not code.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
# LGPL-3.0: melodie-api links libmp3lame via mp3lame-encoder/mp3lame-sys for
# mp3 encoding. Melodie is self-hosted and never redistributed as a binary,
# so LGPL's relinking requirement (the actual concern with static linking)
# doesn't bite here — flagged explicitly rather than silently allowed.
allow = ["LGPL-3.0"]
crate = "mp3lame-encoder"

[[licenses.exceptions]]
allow = ["LGPL-3.0"]
crate = "mp3lame-sys"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Our own workspace members (`path = "../melodie-core"` etc.) have no semver
# req by definition — don't flag those as floating "*" dependencies.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
